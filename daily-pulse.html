<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Pulse">
<title>Daily Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8392b;
    --muted: #7a7060;
    --rule: #c8bfaa;
    --morning: #b07010;
    --evening: #3a5f8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── SETUP ── */
  #setup-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 28px;
  }

  .setup-logo {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .setup-title {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--ink);
  }

  .setup-rule {
    width: 40px;
    height: 2px;
    background: var(--accent);
    margin: 20px auto 32px;
  }

  .setup-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    align-self: flex-start;
    width: 100%;
  }

  .setup-input {
    width: 100%;
    background: var(--cream);
    border: 1.5px solid var(--rule);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 8px;
  }

  .setup-input:focus { border-color: var(--accent); }

  .setup-hint {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
    align-self: flex-start;
  }

  .btn-primary {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
    margin-top: 8px;
  }

  .btn-primary:active { opacity: 0.8; }

  /* ── MASTHEAD ── */
  .masthead {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 24px 18px;
    padding-top: calc(20px + env(safe-area-inset-top));
    position: relative;
  }

  .masthead-eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rule);
    margin-bottom: 4px;
  }

  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
  }

  .masthead-title span { color: var(--accent); }

  .masthead-date {
    font-size: 11px;
    color: var(--rule);
    margin-top: 6px;
    font-weight: 300;
  }

  .settings-btn {
    position: absolute;
    top: calc(20px + env(safe-area-inset-top));
    right: 20px;
    background: none;
    border: none;
    color: var(--rule);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── TRIGGERS ── */
  .trigger-section { padding: 16px 16px 0; }

  .trigger-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .trigger-btn {
    background: var(--cream);
    border: 1.5px solid var(--rule);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }

  .trigger-btn:active { transform: scale(0.97); }
  .trigger-btn.loading { opacity: 0.5; pointer-events: none; }
  .trigger-btn.morning { border-color: #e8a020; }
  .trigger-btn.evening { border-color: var(--evening); }
  .trigger-btn.morning .trigger-label { color: var(--morning); }
  .trigger-btn.evening .trigger-label { color: var(--evening); }

  .trigger-icon { font-size: 20px; margin-bottom: 3px; }

  .trigger-label {
    font-size: 13px;
    font-weight: 500;
    display: block;
  }

  .trigger-sub {
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  /* ── SPINNER ── */
  .spinner-wrap {
    text-align: center;
    padding: 30px 20px;
    display: none;
  }

  .spinner-wrap.visible { display: block; }

  .spinner {
    width: 26px;
    height: 26px;
    border: 2.5px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner-label {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }

  /* ── ERROR ── */
  .error-box {
    background: #fff0ee;
    border: 1px solid #f0c0b8;
    border-radius: 10px;
    padding: 14px 16px;
    margin: 12px 16px 0;
    font-size: 13px;
    color: #a03020;
    line-height: 1.5;
    display: none;
  }

  .error-box.visible { display: block; }

  /* ── DIGEST SECTIONS ── */
  .digest-section { margin: 16px 0 0; }

  .digest-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 0 16px 10px;
    border-bottom: 1.5px solid var(--rule);
    margin: 0 16px 12px;
    flex-wrap: wrap;
  }

  .digest-header-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
  }

  .digest-header-title.morning { color: var(--morning); }
  .digest-header-title.evening { color: var(--evening); }

  .digest-date-pill {
    display: inline-block;
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 10px;
    color: var(--muted);
  }

  .digest-timestamp {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* ── CARDS ── */
  .cards-wrap { padding: 0 16px; }

  .result-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    animation: slideUp 0.3s ease forwards;
    opacity: 0;
  }

  .result-card.restored { animation: none; opacity: 1; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card:nth-child(1) { animation-delay: 0.05s; }
  .result-card:nth-child(2) { animation-delay: 0.12s; }
  .result-card:nth-child(3) { animation-delay: 0.19s; }
  .result-card:nth-child(4) { animation-delay: 0.26s; }
  .result-card:nth-child(5) { animation-delay: 0.33s; }
  .result-card:nth-child(6) { animation-delay: 0.40s; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 14px 9px;
    border-bottom: 1px solid #f0ebe0;
  }

  .card-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .badge-intl  { background: #fff0e6; color: #c05010; }
  .badge-local { background: #e6f0f8; color: #2a4f7a; }

  .card-num {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    font-family: 'Playfair Display', serif;
    font-style: italic;
  }

  .card-body { padding: 12px 14px 14px; }

  .card-headline {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .card-summary {
    font-size: 13px;
    line-height: 1.7;
    color: #3a3530;
    margin-bottom: 12px;
  }

  .card-sources {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 12px;
  }

  .source-chip {
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 20px;
    padding: 3px 9px;
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
  }

  /* ── COPY BAR ── */
  .copy-bar {
    display: flex;
    padding: 8px 16px 4px;
  }

  .btn-copy {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 13px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.2s;
  }

  .btn-copy:active { opacity: 0.8; }
  .btn-copy.morning-copy { background: #fff3d6; color: var(--morning); }
  .btn-copy.evening-copy { background: #e6f0f8; color: var(--evening); }

  /* ── NO UPDATE ── */
  .no-update-card {
    background: white;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    margin: 0 0 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  .no-update-card p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .bottom-spacer { height: 40px; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <p class="setup-logo">Your morning briefing</p>
  <h1 class="setup-title">Daily <span style="color:var(--accent)">Pulse</span></h1>
  <div class="setup-rule"></div>
  <p class="setup-label">Gemini API Key</p>
  <input type="password" id="gemini-key-input" class="setup-input" placeholder="Paste your Gemini key" autocomplete="off" spellcheck="false">
  <p class="setup-hint">Get a free key at aistudio.google.com — no other keys needed.</p>
  <button class="btn-primary" onclick="saveKeys()">Save & Open Daily Pulse</button>
</div>

<!-- MAIN SCREEN -->
<div id="main-screen" style="display:none">
  <div class="masthead">
    <p class="masthead-eyebrow">Hong Kong Edition</p>
    <h1 class="masthead-title">Daily <span>Pulse</span></h1>
    <p class="masthead-date" id="today-date"></p>
    <button class="settings-btn" onclick="showSetup()">⚙︎</button>
  </div>

  <div class="trigger-section">
    <div class="trigger-row">
      <div class="trigger-btn morning" id="btn-morning" onclick="runDigest('morning')">
        <div class="trigger-icon">☀️</div>
        <span class="trigger-label">Morning</span>
        <span class="trigger-sub">3 intl · 3 local</span>
      </div>
      <div class="trigger-btn evening" id="btn-evening" onclick="runDigest('evening')">
        <div class="trigger-icon">🌙</div>
        <span class="trigger-label">Evening</span>
        <span class="trigger-sub">1 intl · 1 local</span>
      </div>
    </div>
  </div>

  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
    <p class="spinner-label" id="spinner-label">Searching live headlines…</p>
  </div>

  <div class="error-box" id="error-box"></div>

  <!-- Morning digest -->
  <div id="morning-section" style="display:none">
    <div class="digest-section">
      <div class="digest-header">
        <span class="digest-header-title morning">☀️ Morning</span>
        <span class="digest-date-pill" id="morning-date-pill"></span>
        <span class="digest-timestamp" id="morning-timestamp"></span>
      </div>
      <div class="cards-wrap" id="morning-cards"></div>
      <div class="copy-bar">
        <button class="btn-copy morning-copy" onclick="copyDigest('morning')">Copy Morning to Capacities</button>
      </div>
    </div>
  </div>

  <!-- Evening digest -->
  <div id="evening-section" style="display:none">
    <div class="digest-section">
      <div class="digest-header">
        <span class="digest-header-title evening">🌙 Evening</span>
        <span class="digest-date-pill" id="evening-date-pill"></span>
        <span class="digest-timestamp" id="evening-timestamp"></span>
      </div>
      <div class="cards-wrap" id="evening-cards"></div>
      <div class="copy-bar">
        <button class="btn-copy evening-copy" onclick="copyDigest('evening')">Copy Evening to Capacities</button>
      </div>
    </div>
  </div>

  <div class="bottom-spacer"></div>
</div>

<script>
// ── PROMPTS ──
function buildPrompt(type, morningHeadlines) {
  const isEvening = type === 'evening';
  const count = isEvening ? 1 : 3;

  const exclusion = (isEvening && morningHeadlines && morningHeadlines.length)
    ? `\n\nIMPORTANT: The following stories were already covered in the morning digest — do NOT repeat them. Find different stories:\n${morningHeadlines.map((h,i) => `${i+1}. ${h}`).join('\n')}`
    : '';

  const today = new Date().toLocaleDateString('en-HK', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  return `You are Daily Pulse, a news digest for a Hong Kong-based reader. Today is ${today}.

Use Google Search to find today's live top headlines from these sources.

INTERNATIONAL SOURCES (search in this order, stop early if threshold met):
1. Reuters  2. BBC News  3. Bloomberg  4. New York Times  5. CNN  6. Wall Street Journal  7. CNBC  8. Fox News

LOCAL HK SOURCES (search in this order, stop early if threshold met):
1. SCMP  2. RTHK  3. HKET  4. Ming Pao  5. HKT  6. On.cc

SELECTION RULES:
- Find the ${count} most repeated international stor${count > 1 ? 'ies' : 'y'} that appear in the TOP 3 headline positions of at least 3 sources
- Find the ${count} most repeated local HK stor${count > 1 ? 'ies' : 'y'} that appear in the TOP 3 headline positions of at least 3 HK sources
- Only fall back to top 4 or top 5 if nothing qualifies at top 3
- If truly no story meets the threshold, return no_update: true${exclusion}

FOR EACH STORY PROVIDE:
- headline: clear, factual headline
- summary: 100-150 words minimum. If the story is especially significant or complex, extend up to 400 words. Always give enough detail for the reader to understand what happened, why it matters, and what comes next.
- sources: array of {name, position} for each source that covered it in their top headlines
- url: link to the single best, most detailed article

Return ONLY valid JSON, no markdown, no explanation, no code fences:
{
  "international": [
    {"headline":"...","summary":"...","sources":[{"name":"BBC","position":1},{"name":"CNN","position":2}],"url":"https://..."}
  ],
  "local": [
    {"headline":"...","summary":"...","sources":[{"name":"SCMP","position":1},{"name":"RTHK","position":2}],"url":"https://..."}
  ]
}`;
}

// ── STATE ──
let digestStore = { morning: null, evening: null };

// ── INIT ──
window.addEventListener('load', () => {
  const gk = localStorage.getItem('dp_gemini_key');
  if (!gk) {
    document.getElementById('setup-screen').style.display = 'flex';
  } else {
    showMain();
    restoreDigests();
  }
});

function saveKeys() {
  const gk = document.getElementById('gemini-key-input').value.trim();
  if (!gk) { alert('Please enter your Gemini API key.'); return; }
  localStorage.setItem('dp_gemini_key', gk);
  showMain();
  restoreDigests();
}

function showMain() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('today-date').textContent = formatDate(new Date());
}

function showSetup() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

// ── RESTORE ──
function restoreDigests() {
  const saved = localStorage.getItem('dp_digests');
  if (!saved) return;
  try {
    digestStore = JSON.parse(saved);
    if (digestStore.morning) renderSection('morning', digestStore.morning, true);
    if (digestStore.evening) renderSection('evening', digestStore.evening, true);
  } catch(e) {}
}

function saveDigests() {
  localStorage.setItem('dp_digests', JSON.stringify(digestStore));
}

// ── RUN ──
async function runDigest(type) {
  const gemKey = localStorage.getItem('dp_gemini_key');
  if (!gemKey) { showSetup(); return; }

  hideError();
  setLoading(true);
  updateSpinner('Searching live headlines…');

  try {
    const morningHeadlines = (type === 'evening' && digestStore.morning)
      ? (digestStore.morning.items.international || []).map(i => i.headline)
      : [];

    const prompt = buildPrompt(type, morningHeadlines);
    updateSpinner('Analysing across sources…');
    const parsed = await callGemini(gemKey, prompt);

    const record = { items: parsed, fetchedAt: new Date().toISOString() };
    digestStore[type] = record;
    saveDigests();
    setLoading(false);
    renderSection(type, record, false);

  } catch(e) {
    setLoading(false);
    showError('⚠ ' + (e.message || 'Something went wrong. Please try again.'));
  }
}

// ── GEMINI WITH SEARCH GROUNDING ──
async function callGemini(key, prompt) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }], role: 'user' }],
        tools: [{ google_search: {} }],
        generationConfig: {
          temperature: 0.2,
          maxOutputTokens: 4000
        }
      })
    }
  );

  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || 'Gemini API error. Check your key.');

  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  let clean = raw.replace(/```json|```/gi, '').trim();
  const jsonMatch = clean.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('Could not parse response. Try again in a moment.');
  return JSON.parse(jsonMatch[0]);
}

// ── RENDER ──
function renderSection(type, record, restored) {
  const section   = document.getElementById(`${type}-section`);
  const cardsWrap = document.getElementById(`${type}-cards`);
  const datePill  = document.getElementById(`${type}-date-pill`);
  const timestamp = document.getElementById(`${type}-timestamp`);

  const fetchedAt = new Date(record.fetchedAt);
  datePill.textContent  = formatDate(fetchedAt);
  timestamp.textContent = formatTime(fetchedAt);
  cardsWrap.innerHTML   = '';

  if (record.items.no_update) {
    cardsWrap.innerHTML = `<div class="no-update-card"><p>No important update this evening.<br>No headline reached the top-3 threshold.</p></div>`;
  } else {
    const intl  = record.items.international || [];
    const local = record.items.local || [];
    intl.forEach((item, i)  => cardsWrap.appendChild(makeCard(item, 'intl',  i + 1, restored)));
    local.forEach((item, i) => cardsWrap.appendChild(makeCard(item, 'local', i + 1, restored)));
  }

  section.style.display = 'block';
}

function makeCard(item, type, num, restored) {
  const card = document.createElement('div');
  card.className = restored ? 'result-card restored' : 'result-card';

  const badgeClass = type === 'intl' ? 'badge-intl' : 'badge-local';
  const badgeText  = type === 'intl' ? '🌍 International' : '🇭🇰 Local HK';

  const chips = (item.sources || []).map(s => {
    const pos = s.position ? ` #${s.position}` : '';
    return `<span class="source-chip">${s.name}${pos}</span>`;
  }).join('');

  const linkHtml = item.url
    ? `<a class="card-link" href="${item.url}" target="_blank">Read full article →</a>`
    : '';

  card.innerHTML = `
    <div class="card-header">
      <span class="card-badge ${badgeClass}">${badgeText}</span>
      <span class="card-num">${num}</span>
    </div>
    <div class="card-body">
      <p class="card-headline">${item.headline}</p>
      <p class="card-summary">${item.summary || ''}</p>
      <div class="card-sources">${chips}</div>
      ${linkHtml}
    </div>`;
  return card;
}

// ── COPY ──
function copyDigest(type) {
  const record = digestStore[type];
  if (!record) return;

  const label     = type === 'morning' ? '☀️ MORNING DIGEST' : '🌙 EVENING DIGEST';
  const fetchedAt = new Date(record.fetchedAt);
  let text = `${label}\n${formatDate(fetchedAt)} · ${formatTime(fetchedAt)}\n\n`;

  const intl  = record.items.international || [];
  const local = record.items.local || [];

  if (intl.length) {
    text += '🌍 INTERNATIONAL\n\n';
    intl.forEach((item, i) => {
      const srcs = (item.sources || []).map(s => `${s.name} #${s.position}`).join(', ');
      text += `${i+1}. ${item.headline}\n\n${item.summary || ''}\n\nSources: ${srcs}\n${item.url || ''}\n\n`;
    });
  }

  if (local.length) {
    text += '🇭🇰 LOCAL HK\n\n';
    local.forEach((item, i) => {
      const srcs = (item.sources || []).map(s => `${s.name} #${s.position}`).join(', ');
      text += `${i+1}. ${item.headline}\n\n${item.summary || ''}\n\nSources: ${srcs}\n${item.url || ''}\n\n`;
    });
  }

  const btn  = document.querySelector(`.btn-copy.${type}-copy`);
  const orig = btn.textContent;

  navigator.clipboard.writeText(text.trim()).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text.trim();
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

// ── HELPERS ──
function setLoading(on) {
  document.getElementById('spinner').className       = on ? 'spinner-wrap visible' : 'spinner-wrap';
  document.getElementById('btn-morning').className   = on ? 'trigger-btn morning loading' : 'trigger-btn morning';
  document.getElementById('btn-evening').className   = on ? 'trigger-btn evening loading' : 'trigger-btn evening';
}

function updateSpinner(msg) { document.getElementById('spinner-label').textContent = msg; }
function showError(msg)     { const el = document.getElementById('error-box'); el.textContent = msg; el.className = 'error-box visible'; }
function hideError()        { document.getElementById('error-box').className = 'error-box'; }
function formatDate(d)      { return d.toLocaleDateString('en-HK',  { weekday:'long', year:'numeric', month:'long', day:'numeric' }); }
function formatTime(d)      { return d.toLocaleTimeString('en-HK',  { hour:'2-digit', minute:'2-digit' }); }
</script>
